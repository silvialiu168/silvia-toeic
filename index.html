<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#17324d">
  <title>Family English Challenge</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css?v=34">
</head>
<body>
  <header>
    <button id="homeButton" class="ghost hidden">Dashboard</button>
    <div><small>LIU FAMILY</small><h1 id="pageTitle">Family English Challenge</h1></div>
    <button id="installButton" class="ghost hidden">安裝</button>
  </header>

  <main>
    <section id="familyView">
      <div class="hero">
        <p>一起練習，一起進步</p>
        <div class="family-score"><strong id="completedToday">0</strong><span>今日完成人數</span></div>
      </div>
      <div id="userCards" class="dashboard-users"></div>
      <section class="panel"><h2>家庭排行榜</h2><div id="leaderboard"></div></section>
      <section class="panel goals">
        <h2>每日目標</h2>
        <div><b>20</b><span>單字</span></div><div><b>20</b><span>文法</span></div><div><b>30</b><span>分钟學習</span></div>
      </section>
      <section class="panel"><h2>家庭總挑战</h2><p id="familyChallenge"></p></section>
      <section class="panel"><h2>家庭知識點热力图</h2><div id="heatmap" class="heatmap"></div></section>
    </section>

    <section id="learnerView">
      <section id="dashboardPage" class="page active"></section>
      <section id="learnPage" class="page"></section>
      <section id="mistakesPage" class="page"></section>
      <section id="growthPage" class="page"></section>
      <section id="familyPage" class="page"></section>
    </section>
  </main>

  <nav id="bottomNav" class="hidden">
    <button data-page="dashboardPage" class="active">首頁</button>
    <button data-page="learnPage">練習</button>
    <button data-page="mistakesPage">錯題</button>
    <button data-page="growthPage">成長</button>
    <button data-page="familyPage">家庭</button>
  </nav>
  <script src="app.js?v=34"></script>
</body>
</html>
